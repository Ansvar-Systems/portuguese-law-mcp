# Notes:
# - Portugal's DRE (dre.pt) is an excellent structured government legal database
#   with a proper open data API providing JSON responses
# - Lei 58/2019 is Portugal's GDPR implementation law, covering areas of member
#   state discretion including age of digital consent (13 years, one of the lowest
#   in the EU), processing for journalism, and public interest derogations
# - Lei 46/2018 transposes the NIS Directive, establishing the regime juridico
#   da seguranca do ciberespaco (legal framework for cyberspace security) and
#   designating CNCS (Centro Nacional de Ciberseguranca) as the competent authority
# - The Constituicao da Republica Portuguesa Art. 35 specifically addresses the
#   use of computer data (utilizacao da informatica), making it one of the few
#   European constitutions with an explicit digital rights provision
# - The Codigo Penal contains cybercrime provisions in arts. 193-194 (privacy
#   violations, interception of communications) and art. 221 (computer fraud)
# - The Codigo das Sociedades Comerciais (CSC) is the main company law statute,
#   governing all types of commercial companies in Portugal
# - DL 7/2004 (Decreto-Lei) transposes the EU E-Commerce Directive 2000/31/EC
# - Lei 16/2022 is the Electronic Communications Law transposing the European
#   Electronic Communications Code (EECC)
# - CNPD (Comissao Nacional de Protecao de Dados) is one of Europe's oldest DPAs,
#   established in 1994 under the 1991 Data Protection Law (Lei 10/91)
# - Portuguese legal system is based on civil law; Portuguese is the sole official
#   language for all legislation
# - Diario da Republica references are the canonical citation format (e.g.,
#   Diario da Republica, 1.a serie, N.o 151, de 8 de agosto de 2019)
# - Portuguese law distinguishes between Lei (Act of Parliament) and Decreto-Lei
#   (Government decree with force of law); both are published in the DR
